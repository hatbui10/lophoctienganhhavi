<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Học Sinh</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            color: #212529;
            font-size: 11px;
        }
        .container {
            width: 100%;
            background: #fff;
            padding: 2px;
            box-sizing: border-box;
        }
        h3 {
            text-align: center;
            margin: 5px 0 2px 0;
            font-size: 13px;
            color: #1a365d;
        }
        
        /* Phong cách cho ô tìm kiếm số điện thoại ở trên cùng */
        .search-box-container {
 width: 30%;

            padding: 4px;
            background-color: #f1f5f9;
            margin-bottom: 4px;
            border-bottom: 1px solid #cbd5e1;
        }
        .search-input {
            width: 100%;
            box-sizing: border-box;
            padding: 6px;
            font-size: 12px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            outline: none;
        }
        .search-input:focus {
            border-color: #3b82f6;
            background-color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            padding: 5px 2px;
            border: 1px solid #cbd5e1;
            word-wrap: break-word;
            vertical-align: middle;
        }
        th {
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            font-size: 11px;
        }
        .highlight-red {
            background-color: #fee2e2 !important;
            color: #991b1b;
        }
        .text-center {
            text-align: center;
        }
        .stt-col { width: 8%; }
        .name-col { width: 31%; }
        .phone-col { width: 32%; }
        .note-col { width: 29%; }
        
        .btn-call {
            display: block;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            padding: 4px 1px;
            border-radius: 3px;
            font-size: 10.5px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }
        .select-note {
            width: 100%;
            font-size: 11px;
            padding: 2px 0;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Danh Sách Lớp</h3>
    
    <div class="search-box-container">

// Hàm khởi tạo và hiển thị danh sách học sinh ra bảng HTML
function initStudentList() {
    const tbody = document.getElementById('student-list');
    tbody.innerHTML = ""; 

    // Đọc dữ liệu ghi chú đã lưu từ localStorage (nếu có)
    const savedNotes = JSON.parse(localStorage.getItem('studentNotes')) || {};

    students.forEach((student, index) => {
        const row = document.createElement('tr');
        row.className = "student-row";

        // Lấy lại giá trị ghi chú đã lưu trước đó của học sinh (dựa theo số điện thoại làm ID)
        const savedValue = savedNotes[student.phone] || "";

        // Kiểm tra xem nếu ghi chú cũ là 'nghi' thì tự động thêm màu đỏ luôn
        if (savedValue === 'nghi') {
            row.classList.add('highlight-red');
        }

        // Tạo danh sách lựa chọn ghi chú, đồng thời đặt thuộc tính 'selected' cho ghi chú cũ
        let optionsHTML = "";
        noteOptions.forEach(opt => {
            const isSelected = opt.value === savedValue ? "selected" : "";
            optionsHTML += `<option value="${opt.value}" ${isSelected}>${opt.text}</option>`;
        });

        row.innerHTML = `
            <td class="text-center">${index + 1}</td>
            <td class="student-name">${student.name}</td>
            <td class="text-center">
                <a href="tel:${student.phone}" class="btn-call" data-phone="${student.phone}">📞 ${student.phone}</a>
            </td>
            <td>
                <select class="select-note" data-phone="${student.phone}" onchange="checkNote(this)">
                    ${optionsHTML}
                </select>
            </td>
        `;
        
        tbody.appendChild(row);
    });
}

// Hàm lọc tìm kiếm số điện thoại đuôi
function filterPhone() {
    const keyword = document.getElementById('phoneSearch').value.trim();
    const rows = document.querySelectorAll('.student-row');

    rows.forEach(row => {
        const phoneAnchor = row.querySelector('.btn-call');
        if (phoneAnchor) {
            const phoneNumber = phoneAnchor.getAttribute('data-phone');
            if (phoneNumber.includes(keyword)) {
                row.style.display = ""; 
            } else {
                row.style.display = "none"; 
            }
        }
    });
}

// Hàm xử lý khi thay đổi ghi chú: đổi màu và lưu vào localStorage
function checkNote(selectElement) {
    const row = selectElement.closest('tr');
    
    // 1. Xử lý đổi màu nền đỏ
    if (selectElement.value === 'nghi') {
        row.classList.add('highlight-red');
    } else {
        row.classList.remove('highlight-red');
    }

    // 2. Tiến hành lưu vào localStorage
    saveAllNotes();
}

// Hàm quét toàn bộ bảng và lưu trạng thái ghi chú hiện tại
function saveAllNotes() {
    const savedNotes = {};
    const dropdowns = document.querySelectorAll('.select-note');
    
    dropdowns.forEach(select => {
        const phone = select.getAttribute('data-phone');
        const value = select.value;
        // Chỉ lưu những học sinh có chọn ghi chú (khác trống)
        if (value) {
            savedNotes[phone] = value;
        }
    });

    // Lưu chuỗi JSON vào localStorage với key là 'studentNotes'
    localStorage.setItem('studentNotes', JSON.stringify(savedNotes));
}

// Chạy hàm hiển thị danh sách khi trang tải xong
window.onload = initStudentList;
</script>
