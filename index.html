<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Học Sinh</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            color: #212529;
            font-size: 11px;
        }
        .container {
            width: 100%;
            background: #fff;
            padding: 2px;
            box-sizing: border-box;
        }
        h3 {
            text-align: center;
            margin: 5px 0 2px 0;
            font-size: 13px;
            color: #1a365d;
        }
        
        /* Cải tiến bộ khung chứa các ô tìm kiếm nằm ngang */
        .search-box-container {
            display: flex;
            gap: 4px;
            padding: 4px;
            background-color: #f1f5f9;
            margin-bottom: 4px;
            border-bottom: 1px solid #cbd5e1;
        }
        .search-input {
            flex: 1; /* Chia đều không gian 50/50 cho 2 ô nhập */
            box-sizing: border-box;
            padding: 6px;
            font-size: 12px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            outline: none;
        }
        .search-input:focus {
            border-color: #3b82f6;
            background-color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            padding: 5px 2px;
            border: 1px solid #cbd5e1;
            word-wrap: break-word;
            vertical-align: middle;
        }
        th {
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            font-size: 11px;
        }
        .highlight-red {
            background-color: #fee2e2 !important;
            color: #991b1b;
        }
        .text-center {
            text-align: center;
        }
        .stt-col { width: 8%; }
        .name-col { width: 31%; }
        .phone-col { width: 32%; }
        .note-col { width: 29%; }
        
        .btn-call {
            display: block;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            padding: 4px 1px;
            border-radius: 3px;
            font-size: 10.5px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }
        .select-note {
            width: 100%;
            font-size: 11px;
            padding: 2px 0;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Danh Sách Lớp</h3>
    
    <div class="search-box-container">
        <input type="text" id="nameSearch" class="search-input" placeholder="Tìm theo tên học sinh..." onkeyup="filterStudents()">
        <input type="tel" id="phoneSearch" class="search-input" placeholder="Tìm theo số điện thoại..." onkeyup="filterStudents()">

        </thead>

</div>

// Menu ghi chú dùng chung
const noteOptions = [
    { value: "", text: "-- Chọn --" },
    { value: "nghi", text: "Nghỉ hết tháng 7" },
    { value: "lop-truong", text: "Không nghe máy" },
    { value: "di-hoc", text: "Nghỉ hôm nay" },
    { value: "di-hoc1", text: "Nghỉ tuần này" },
    { value: "di-hoc2", text: "Đến muộn" },
    { value: "chu-y", text: "Xin nghỉ hẳn" }
];

// Hàm khởi tạo và hiển thị danh sách học sinh ra bảng HTML
function initStudentList() {
    const tbody = document.getElementById('student-list');
    tbody.innerHTML = ""; 

    const savedNotes = JSON.parse(localStorage.getItem('studentNotes')) || {};

    students.forEach((student, index) => {
        const row = document.createElement('tr');
        row.className = "student-row";

        const savedValue = savedNotes[student.phone] || "";

        if (savedValue === 'nghi') {
            row.classList.add('highlight-red');
        }

        let optionsHTML = "";
        noteOptions.forEach(opt => {
            const isSelected = opt.value === savedValue ? "selected" : "";
            optionsHTML += `<option value="${opt.value}" ${isSelected}>${opt.text}</option>`;
        });

        row.innerHTML = `
            <td class="text-center">${index + 1}</td>
            <td class="student-name">${student.name}</td>
            <td class="text-center">
                <a href="tel:${student.phone}" class="btn-call" data-phone="${student.phone}">📞 ${student.phone}</a>
            </td>
            <td>
                <select class="select-note" data-phone="${student.phone}" onchange="checkNote(this)">
                    ${optionsHTML}
                </select>
            </td>
        `;
        
        tbody.appendChild(row);
    });
}

// Hàm chuẩn hóa chuỗi: chuyển chữ có dấu thành không dấu để tìm kiếm chính xác hơn
function removeVietnameseTones(str) {
    return str.normalize("NFD")
              .replace(/[\u0300-\u036f]/g, "")
              .replace(/đ/g, "d").replace(/Đ/g, "d")
              .toLowerCase();
}

// HÀM LỌC TÌM KIẾM ĐÃ ĐƯỢC GỘP CHUNG (TÌM THEO CẢ TÊN VÀ SỐ)
function filterStudents() {
    const nameKeyword = removeVietnameseTones(document.getElementById('nameSearch').value.trim());
    const phoneKeyword = document.getElementById('phoneSearch').value.trim();
    const rows = document.querySelectorAll('.student-row');

    rows.forEach(row => {
        const nameText = removeVietnameseTones(row.querySelector('.student-name').textContent);
        const phoneAnchor = row.querySelector('.btn-call');
        const phoneText = phoneAnchor ? phoneAnchor.getAttribute('data-phone') : "";

        // Kiểm tra điều kiện: dòng phải khớp cả từ khóa tên VÀ từ khóa số điện thoại
        const matchesName = nameText.includes(nameKeyword);
        const matchesPhone = phoneText.includes(phoneKeyword);

        if (matchesName && matchesPhone) {
            row.style.display = ""; 
        } else {
            row.style.display = "none"; 
        }
    });
}

// Hàm xử lý khi thay đổi ghi chú: đổi màu và lưu vào localStorage
function checkNote(selectElement) {
    const row = selectElement.closest('tr');
    
    if (selectElement.value === 'nghi') {
        row.classList.add('highlight-red');
    } else {
        row.classList.remove('highlight-red');
    }

    saveAllNotes();
}

// Hàm quét toàn bộ bảng và lưu trạng thái ghi chú hiện tại
function saveAllNotes() {
    const savedNotes = {};
    const dropdowns = document.querySelectorAll('.select-note');
    
    dropdowns.forEach(select => {
        const phone = select.getAttribute('data-phone');
        const value = select.value;
        if (value) {
            savedNotes[phone] = value;
        }
    });

    localStorage.setItem('studentNotes', JSON.stringify(savedNotes));
}

window.onload = initStudentList;
