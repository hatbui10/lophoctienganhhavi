<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Học Sinh</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            color: #212529;
            font-size: 11px;
        }
        .container {
            width: 100%;
            background: #fff;
            padding: 2px;
            box-sizing: border-box;
        }
        h3 {
            text-align: center;
            margin: 5px 0 2px 0;
            font-size: 13px;
            color: #1a365d;
        }
        
        /* Phong cách cho ô tìm kiếm số điện thoại ở trên cùng */
        .search-box-container {
            padding: 4px;
            background-color: #f1f5f9;
            margin-bottom: 4px;
            border-bottom: 1px solid #cbd5e1;
        }
        .search-input {
            width: 100%;
            box-sizing: border-box;
            padding: 6px;
            font-size: 12px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            outline: none;
        }
        .search-input:focus {
            border-color: #3b82f6;
            background-color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            padding: 5px 2px;
            border: 1px solid #cbd5e1;
            word-wrap: break-word;
            vertical-align: middle;
        }
        th {
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            font-size: 11px;
        }
        .highlight-red {
            background-color: #fee2e2 !important;
            color: #991b1b;
        }
        .text-center {
            text-align: center;
        }
        .stt-col { width: 8%; }
        .name-col { width: 31%; }
        .phone-col { width: 32%; }
        .note-col { width: 29%; }
        
        .btn-call {
            display: block;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            padding: 4px 1px;
            border-radius: 3px;
            font-size: 10.5px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }
        .select-note {
            width: 100%;
            font-size: 11px;
            padding: 2px 0;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Danh Sách Lớp</h3>
    
    <div class="search-box-container">
        <input type="tel" id="phoneSearch" class="search-input" placeholder="Nhập số điện thoại (VD: 6 số cuối) để tìm..." onkeyup="filterPhone()">
    </div>

    <table>
        <thead>
            <tr>
                <th class="stt-col text-center">STT</th>
                <th class="name-col">Họ và Tên</th>
                <th class="phone-col text-center">Điện thoại</th>
                <th class="note-col">Ghi chú</th>
            </tr>
        </thead>
        <tbody id="student-list"></tbody>
    </table>
</div>

<script>
// --- 1. KHAI BÁO DANH SÁCH HỌC SINH TẠI ĐÂY ---
// Bạn có thể dễ dàng thêm, sửa, xóa học sinh trong mảng này
const students = [
    { name: "Nguyễn Văn A", phone: "0901234567" },
    { name: "Trần Thị B", phone: "0912345678" },
    { name: "Lê Hoàng C", phone: "0983456789" },
    { name: "Phạm Minh D", phone: "0977666555" },
    { name: "Hoàng Hoàng E", phone: "0933222111" }
];

// Menu ghi chú dùng chung
const noteOptions = [
    { value: "", text: "-- Chọn --" },
    { value: "nghi", text: "Nghỉ hết tháng 7" },
    { value: "lop-truong", text: "Lớp trưởng" },
    { value: "di-hoc", text: "Đi học đầy đủ" },
    { value: "chu-y", text: "Cần chú ý" }
];

// Hàm khởi tạo và hiển thị danh sách học sinh ra bảng HTML
function initStudentList() {
    const tbody = document.getElementById('student-list');
    tbody.innerHTML = ""; // Xóa dữ liệu cũ nếu có

    students.forEach((student, index) => {
        // Tạo thẻ tr cho từng học sinh
        const row = document.createElement('tr');
        row.className = "student-row";

        // Tạo chuỗi HTML cho danh sách lựa chọn ghi chú (dropdown)
        let optionsHTML = "";
        noteOptions.forEach(opt => {
            optionsHTML += `<option value="${opt.value}">${opt.text}</option>`;
        });

        // Đổ cấu trúc cột vào dòng
        row.innerHTML = `
            <td class="text-center">${index + 1}</td>
            <td class="student-name">${student.name}</td>
            <td class="text-center">
                <a href="tel:${student.phone}" class="btn-call" data-phone="${student.phone}">📞 ${student.phone}</a>
            </td>
            <td>
                <select class="select-note" onchange="checkNote(this)">
                    ${optionsHTML}
                </select>
            </td>
        `;
        
        tbody.appendChild(row);
    });
}

// Hàm lọc tìm kiếm số điện thoại đuôi
function filterPhone() {
    const keyword = document.getElementById('phoneSearch').value.trim();
    const rows = document.querySelectorAll('.student-row');

    rows.forEach(row => {
        const phoneAnchor = row.querySelector('.btn-call');
        if (phoneAnchor) {
            const phoneNumber = phoneAnchor.getAttribute('data-phone');
            if (phoneNumber.includes(keyword)) {
                row.style.display = ""; 
            } else {
                row.style.display = "none"; 
            }
        }
    });
}

// Hàm kiểm tra ghi chú để đổi màu nền đỏ nếu nghỉ học
function checkNote(selectElement) {
    var row = selectElement.closest('tr');
    if (selectElement.value === 'nghi') {
        row.classList.add('highlight-red');
    } else {
        row.classList.remove('highlight-red');
    }
}

// Chạy hàm hiển thị danh sách khi trang tải xong
window.onload = initStudentList;
</script>

</body>
</html>
