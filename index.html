<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Sách Học Sinh</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
            color: #212529;
            font-size: 11px;
        }
        .container {
            width: 100%;
            background: #fff;
            padding: 2px;
            box-sizing: border-box;
        }
        h3 {
            text-align: center;
            margin: 5px 0 2px 0;
            font-size: 13px;
            color: #1a365d;
        }
        
        /* Phong cách cho ô tìm kiếm số điện thoại ở trên cùng */
        .search-box-container {
            padding: 4px;
            background-color: #f1f5f9;
            margin-bottom: 4px;
            border-bottom: 1px solid #cbd5e1;
        }
        .search-input {
            width: 100%;
            box-sizing: border-box;
            padding: 6px;
            font-size: 12px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            outline: none;
        }
        .search-input:focus {
            border-color: #3b82f6;
            background-color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            padding: 5px 2px;
            border: 1px solid #cbd5e1;
            word-wrap: break-word;
            vertical-align: middle;
        }
        th {
            background-color: #1e293b;
            color: white;
            font-weight: 600;
            font-size: 11px;
        }
        .highlight-red {
            background-color: #fee2e2 !important;
            color: #991b1b;
        }
        .text-center {
            text-align: center;
        }
        .stt-col { width: 8%; }
        .name-col { width: 31%; }
        .phone-col { width: 32%; }
        .note-col { width: 29%; }
        
        .btn-call {
            display: block;
            background-color: #22c55e;
            color: white;
            text-decoration: none;
            padding: 4px 1px;
            border-radius: 3px;
            font-size: 10.5px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }
        .select-note {
            width: 100%;
            font-size: 11px;
            padding: 2px 0;
            border: 1px solid #cbd5e1;
            border-radius: 3px;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Danh Sách Lớp</h3>
    
    <div class="search-box-container">
        <input type="tel" id="phoneSearch" class="search-input" placeholder="Nhập số điện thoại (VD: 6 số cuối) để tìm..." onkeyup="filterPhone()">
    </div>

    <table>
        <thead>
            <tr>
                <th class="stt-col text-center">STT</th>
                <th class="name-col">Họ và Tên</th>
                <th class="phone-col text-center">Điện thoại</th>
                <th class="note-col">Ghi chú</th>
            </tr>
        </thead>
        <tbody id="student-list">
            
            <tr class="student-row">
                <td class="text-center">1</td>
                <td class="student-name">Nguyễn Văn A</td>
                <td class="text-center">
                    <a href="tel:0901234567" class="btn-call" data-phone="0901234567">📞 0901234567</a>
                </td>
                <td><select class="select-note" onchange="checkNote(this)"></select></td>
            </tr>
            <tr class="student-row">
                <td class="text-center">2</td>
                <td class="student-name">Trần Thị B</td>
                <td class="text-center">
                    <a href="tel:0912345678" class="btn-call" data-phone="0912345678">📞 0912345678</a>
                </td>
                <td><select class="select-note" onchange="checkNote(this)"></select></td>
            </tr>
            <tr class="student-row">
                <td class="text-center">3</td>
                <td class="student-name">Lê Hoàng C</td>
                <td class="text-center">
                    <a href="tel:0983456789" class="btn-call" data-phone="0983456789">📞 0983456789</a>
                </td>
                <td><select class="select-note" onchange="checkNote(this)"></select></td>
            </tr>

        </tbody>
    </table>
</div>

<script>
// Menu ghi chú dùng chung
const noteOptions = [
    { value: "", text: "-- Chọn --" },
    { value: "nghi", text: "Nghỉ hết tháng 7" },
    { value: "lop-truong", text: "Lớp trưởng" },
    { value: "di-hoc", text: "Đi học đầy đủ" },
    { value: "chu-y", text: "Cần chú ý" }
];

// Hàm lọc tìm kiếm số điện thoại đuôi
function filterPhone() {
    // Lấy giá trị người dùng nhập vào và xóa bỏ các khoảng trắng thừa
    const keyword = document.getElementById('phoneSearch').value.trim();
    const rows = document.querySelectorAll('.student-row');

    rows.forEach(row => {
        // Tìm thẻ chứa số điện thoại bên trong dòng này
        const phoneAnchor = row.querySelector('.btn-call');
        if (phoneAnchor) {
            const phoneNumber = phoneAnchor.getAttribute('data-phone');
            
            // Kiểm tra xem số điện thoại thực tế có chứa/hoặc kết thúc bằng chuỗi vừa nhập không
            if (phoneNumber.includes(keyword)) {
                row.style.display = ""; // Hiện lại dòng nếu khớp
            } else {
                row.style.display = "none"; // Ẩn dòng đi nếu không khớp
            }
        }
    });
}

function initDropdowns() {
    const dropdowns = document.querySelectorAll('.select-note');
    dropdowns.forEach(select => {
        if (select.children.length === 0) {
            noteOptions.forEach(opt => {
                const option = document.createElement('option');
                option.value = opt.value;
                option.textContent = opt.text;
                select.appendChild(option);
            });
        }
    });
}

function checkNote(selectElement) {
    var row = selectElement.closest('tr');
    if (selectElement.value === 'nghi') {
        row.classList.add('highlight-red');
    } else {
        row.classList.remove('highlight-red');
    }
}

window.onload = initDropdowns;
</script>

</body>
</html>
